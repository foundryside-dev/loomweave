site_name: Loomweave
site_description: Code archaeology for coding agents — entity-level facts about your codebase, served over MCP
site_url: https://loomweave.foundryside.dev
repo_url: https://github.com/foundryside-dev/loomweave
repo_name: foundryside-dev/loomweave
edit_uri: edit/main/web/docs/

# Source lives under web/; the default `site/` name is reserved for the build
# output (gitignored). gh-deploy publishes to the gh-pages branch.
site_dir: ../site-build

theme:
  name: material
  custom_dir: overrides
  palette:
    # The named palette only seeds Material's on-primary text colour (white).
    # The visible accent is remapped to Loomweave amber/brass in
    # docs/stylesheets/extra.css under each [data-md-color-scheme] selector,
    # exactly as Wardline remaps the shared Weft ramp to teal.
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - content.code.copy
    - search.suggest
  font:
    text: Inter
    code: JetBrains Mono

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.details

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Concepts:
      - The entity model: concepts/entity-model.md
      - MCP consult tools: concepts/mcp-tools.md
  - Reference:
      - MCP tool reference: reference/mcp-tools.md
      - CLI: reference/cli.md
  - About:
      - Changelog: https://github.com/foundryside-dev/loomweave/blob/main/CHANGELOG.md
      - Contributing: https://github.com/foundryside-dev/loomweave/blob/main/CLAUDE.md
      - License: https://github.com/foundryside-dev/loomweave/blob/main/LICENSE
