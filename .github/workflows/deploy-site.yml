# Build the Loomweave member Astro site (site/) and deploy to GitHub Pages.
#
# The site deploys to loomweave.foundryside.dev (CNAME in site/public/CNAME,
# copied verbatim into the build output). It consumes the shared @weft/site-kit,
# which lives in a SUBDIRECTORY of a DIFFERENT repo (foundryside-dev/weft) — so
# the build first sparse-fetches the kit into site/vendor/site-kit (via the
# preinstall hook in package.json) and resolves it as a file: dependency.
#
# NOTE: this supersedes the legacy `docs.yml`, which publishes the hand-rolled
# www/ site to the gh-pages branch. Retire docs.yml and switch the Pages source
# to "GitHub Actions" once this Astro site is the live loomweave.foundryside.dev.
name: Deploy site

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

# GitHub Pages deploy permissions.
permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight Pages deploy at a time; don't cancel a running deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Configure Pages
        # Pin the Pages source to GitHub Actions (build_type=workflow); enables
        # Pages if needed. Without this, deploy-pages fails when the repo is
        # still set to "Deploy from a branch".
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
        with:
          enablement: true

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20

      - name: Fetch @weft/site-kit
        # Sparse-fetch packages/site-kit from foundryside-dev/weft into
        # site/vendor/site-kit so the file: dependency resolves. (npm install
        # also triggers this via the preinstall hook; running it explicitly
        # keeps the failure mode legible in CI logs.)
        run: npm run fetch-site-kit

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Build
        # prebuild hook copies @weft/site-kit/assets into public/_site-kit.
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
