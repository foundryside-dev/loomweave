name: Release

# Per ADR-033 — pushed tags matching v* trigger a multi-platform binary build
# plus Python plugin sdist, attached to a GitHub Release. Build jobs run only
# after the `verify` gate (mirroring ci.yml) is green, so a broken commit
# cannot publish a Release with `draft: false`.
on:
  push:
    tags:
      - "v*"
  # Manual dispatch produces build artifacts on the workflow run for inspection.
  # The `release` job is gated on event_name == 'push', so workflow_dispatch
  # never publishes a public Release — it only validates that the build/verify
  # plumbing is healthy before a tag push.
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

permissions:
  actions: read
  contents: write
  id-token: write

jobs:
  verify:
    # Pre-release gate: must mirror ci.yml so a broken commit cannot reach the
    # build/publish jobs. Duplicated rather than refactored into a reusable
    # workflow on the eve of 1.0; that refactor is post-release scope.
    name: Verify (pre-release gates)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-verify

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: cache pyright runtime
        uses: actions/cache@v4
        with:
          path: ~/.cache/pyright-python/
          key: pyright-python-1.1.409-${{ runner.os }}

      - name: rust fmt
        run: cargo fmt --all -- --check

      - name: migration retirement guard
        run: |
          python scripts/check-migration-retirement.py --self-test
          python scripts/check-migration-retirement.py

      - name: cross-workspace version lockstep
        run: python scripts/check-workspace-version-lockstep.py

      - name: rust clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: install cargo-nextest
        uses: taiki-e/install-action@cargo-nextest

      - name: rust build workspace bins
        run: cargo build --workspace --bins

      - name: rust nextest
        run: cargo nextest run --workspace --all-features --no-tests=pass

      - name: rust doc
        run: cargo doc --workspace --no-deps --all-features
        env:
          RUSTDOCFLAGS: "-D warnings"

      - name: install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      - name: cargo deny
        run: cargo deny check

      - name: check B.4* gate result freshness
        run: python scripts/check-b4-gate-result.py

      - name: check Python ontology version lockstep
        run: |
          python scripts/check-python-ontology-version.py --self-test
          python scripts/check-python-ontology-version.py

      - name: install plugin (dev extras)
        run: python -m pip install -e 'plugins/python[dev]'

      - name: ruff check
        run: ruff check plugins/python

      - name: ruff format check
        run: ruff format --check plugins/python

      - name: mypy
        run: mypy --strict plugins/python

      - name: pytest
        run: pytest plugins/python

      - name: install sqlite3 cli
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends sqlite3

      - name: walking skeleton (end-to-end)
        run: bash tests/e2e/sprint_1_walking_skeleton.sh

      - name: WP5 secret scanner smoke
        run: CARGO_BUILD=0 bash tests/e2e/wp5_secret_scan.sh

  build-rust:
    needs: [verify]
    name: Build clarion (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            apt_packages: ""
            linker_env: ""
            linker: ""
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            apt_packages: gcc-aarch64-linux-gnu
            linker_env: CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER
            linker: aarch64-linux-gnu-gcc
          - target: x86_64-apple-darwin
            runner: macos-13
            apt_packages: ""
            linker_env: ""
            linker: ""
          - target: aarch64-apple-darwin
            runner: macos-14
            apt_packages: ""
            linker_env: ""
            linker: ""
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: install linux cross linker
        if: matrix.apt_packages != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ${{ matrix.apt_packages }}

      - name: build release
        run: |
          set -euo pipefail
          if [ -n "${{ matrix.linker_env }}" ]; then
            export "${{ matrix.linker_env }}=${{ matrix.linker }}"
          fi
          cargo build --release --locked --bin clarion --target ${{ matrix.target }}

      - name: package
        id: package
        run: |
          set -euo pipefail
          STAGE="clarion-${{ matrix.target }}"
          mkdir -p "$STAGE"
          cp "target/${{ matrix.target }}/release/clarion" "$STAGE/"
          cp README.md "$STAGE/"
          if [ -f LICENSE ]; then cp LICENSE "$STAGE/"; fi
          ARCHIVE="$STAGE.tar.gz"
          tar czf "$ARCHIVE" "$STAGE"
          # Portable across the runner matrix: macOS images ship `shasum`, not
          # GNU `sha256sum`. Both emit the same `<hex>  <filename>` line.
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"
          else
            shasum -a 256 "$ARCHIVE" > "$ARCHIVE.sha256"
          fi
          echo "archive=$ARCHIVE" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: clarion-${{ matrix.target }}
          path: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.archive }}.sha256
          if-no-files-found: error
          retention-days: 7

  release-subjects:
    name: Derive release artifact subjects
    runs-on: ubuntu-latest
    needs: [build-rust, build-plugin]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    outputs:
      rust-subjects: ${{ steps.subjects.outputs.rust-subjects }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: compute Rust archive subjects
        id: subjects
        run: |
          set -euo pipefail
          while IFS= read -r -d '' asset; do
            digest=$(sha256sum "$asset" | cut -d' ' -f1)
            printf '%s  %s\n' "$digest" "$(basename "$asset")"
          done < <(find artifacts -name 'clarion-*.tar.gz' -print0 | sort -z) > rust-subjects.txt
          test -s rust-subjects.txt
          echo "rust-subjects=$(base64 -w0 rust-subjects.txt)" >> "$GITHUB_OUTPUT"

  build-plugin:
    needs: [verify]
    name: Build Python plugin sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install build
        run: python -m pip install --upgrade build

      - name: build sdist
        run: python -m build --sdist --outdir dist plugins/python

      - name: checksum
        run: |
          set -euo pipefail
          cd dist
          for f in *.tar.gz; do
            sha256sum "$f" > "$f.sha256"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: clarion-plugin-python-sdist
          path: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
          if-no-files-found: error
          retention-days: 7

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-rust, build-plugin]
    # Only publish to a Release when a real tag pushed; workflow_dispatch leaves
    # artifacts on the workflow run for inspection without creating a public Release.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: stage release assets
        run: |
          set -euo pipefail
          mkdir -p release
          find artifacts -name '*.tar.gz' -o -name '*.tar.gz.sha256' \
            | xargs -I{} cp {} release/
          ls -la release/

      - name: install cosign
        uses: sigstore/cosign-installer@v3

      - name: sign release archives
        run: |
          set -euo pipefail
          for asset in release/*.tar.gz; do
            cosign sign-blob --yes \
              --output-signature "$asset.sig" \
              --output-certificate "$asset.pem" \
              "$asset"
          done
          ls -la release/

      - name: smoke-verify release archive signatures
        run: |
          set -euo pipefail
          for asset in release/*.tar.gz; do
            cosign verify-blob \
              --certificate "$asset.pem" \
              --signature "$asset.sig" \
              --certificate-identity-regexp "https://github.com/${GITHUB_REPOSITORY}/.github/workflows/release.yml@refs/tags/v.*" \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              "$asset"
          done

      - name: derive previous tag
        id: prev
        run: |
          set -euo pipefail
          PREV=$(git tag --sort=-v:refname | grep -v "^${GITHUB_REF_NAME}\$" | head -n1 || true)
          if [ -z "$PREV" ]; then
            echo "previous=" >> "$GITHUB_OUTPUT"
            echo "No previous tag found (first release)."
          else
            echo "previous=$PREV" >> "$GITHUB_OUTPUT"
            echo "Previous tag: $PREV"
          fi

      - name: generate notes
        id: notes
        run: |
          set -euo pipefail
          PREV="${{ steps.prev.outputs.previous }}"
          # Derive the actual sdist filename from the staged artifact rather
          # than hard-coding it: PEP 625 (and the hatchling build backend)
          # normalize the project name and embed the version, so any version
          # bump or normalization-rule change would invalidate a literal URL.
          # `|| true` so `set -e` does not abort the script when the glob
          # is empty — we want to fall through to the explicit error below.
          SDIST_PATH=$(ls release/clarion[-_]plugin[-_]python*.tar.gz 2>/dev/null | head -n1 || true)
          if [ -z "$SDIST_PATH" ]; then
            echo "::error::no Python plugin sdist found in release/ — refusing to publish notes with a broken install link" >&2
            exit 1
          fi
          SDIST_NAME=$(basename "$SDIST_PATH")
          {
            echo "## Clarion ${GITHUB_REF_NAME}"
            echo ""
            echo "### Install"
            echo ""
            echo "Pick the archive for your platform from the Assets list below."
            echo "Verify the SHA256, extract, and place \`clarion\` on your \`\$PATH\`."
            echo ""
            echo "\`\`\`bash"
            echo "curl -L -o clarion.tar.gz \\"
            echo "  https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/clarion-x86_64-unknown-linux-gnu.tar.gz"
            echo "tar xzf clarion.tar.gz"
            echo "install clarion-x86_64-unknown-linux-gnu/clarion ~/.local/bin/"
            echo ""
            echo "pipx install \\"
            echo "  https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/${SDIST_NAME}"
            echo "\`\`\`"
            echo ""
            echo "Full walkthrough: [docs/operator/getting-started.md](https://github.com/${GITHUB_REPOSITORY}/blob/${GITHUB_REF_NAME}/docs/operator/getting-started.md)."
            echo ""
            echo "### Changes"
            echo ""
            if [ -n "$PREV" ]; then
              git log --merges --pretty='- %s (%h)' "${PREV}..${GITHUB_REF_NAME}" || true
            else
              echo "First release — see git history."
            fi
          } > NOTES.md
          echo "notes-file=NOTES.md" >> "$GITHUB_OUTPUT"

      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Clarion ${{ github.ref_name }}
          body_path: ${{ steps.notes.outputs.notes-file }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') }}
          files: release/*
          fail_on_unmatched_files: true

  provenance:
    name: Generate SLSA provenance
    needs: [release, release-subjects]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      actions: read
      contents: write
      id-token: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.release-subjects.outputs.rust-subjects }}
      upload-assets: true
      upload-tag-name: ${{ github.ref_name }}
      provenance-name: clarion-rust-binaries.intoto.jsonl

  publish-plugin-pypi:
    name: Publish Python plugin to PyPI
    runs-on: ubuntu-latest
    needs: [release, build-plugin]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-')
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: clarion-plugin-python-sdist
          path: dist

      - name: keep only Python distributions
        run: rm -f dist/*.sha256

      - name: publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
