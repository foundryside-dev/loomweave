name: Release

# Per ADR-033 — pushed tags matching v* trigger a multi-platform binary build
# plus Python plugin sdist, attached to a GitHub Release. Build jobs run only
# after the `verify` gate (mirroring ci.yml) is green, so a broken commit
# cannot publish a Release with `draft: false`.
on:
  push:
    tags:
      - "v*"
  # Manual dispatch produces build artifacts on the workflow run for inspection.
  # The `release` job is gated on event_name == 'push', so workflow_dispatch
  # never publishes a public Release — it only validates that the build/verify
  # plumbing is healthy before a tag push.
  #
  # `target_index: testpypi` additionally runs `publish-pypi` against TestPyPI
  # (the Phase-C8 dry-run). Real PyPI is NEVER reachable via dispatch — it
  # publishes solely on a pushed `v*` tag. Leave it `none` for a plain
  # build/verify dry-run.
  workflow_dispatch:
    inputs:
      target_index:
        description: "Publish dry-run target (real PyPI only ever publishes on a pushed v* tag)"
        type: choice
        options:
          - none
          - testpypi
        default: none

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RUSTFLAGS: "-D warnings"

permissions:
  contents: read

jobs:
  # Release-only precondition: a real release (tag push) must point at a commit
  # on main. A workflow_dispatch dry-run may run from any branch (it can only
  # ever publish to TestPyPI — see the publish-* job `if`), so this is gated on
  # event_name == 'push'. Kept here, not in verify.yml: it is a release policy
  # check, not a CI gate, so it does not belong in the shared workflow. On a
  # dispatch run it is skipped, which leaves dependent build jobs unblocked
  # (a skipped `needs` does not fail dependents). clarion-c9f62eec7d.
  assert-on-main:
    name: Assert tagged commit is on main
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0

      - name: Assert tagged commit is on main
        run: |
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main || \
            { echo "::error::tag does not point to a commit on main"; exit 1; }

  # The full pre-release gate set (Linux + macOS, Rust + Python + e2e). This is
  # the SAME reusable workflow ci.yml calls, so the pre-release gate can no
  # longer drift from CI — it is identical by construction. Replaces the
  # previously-duplicated `verify` + `verify-macos` jobs (V11-CI-01,
  # clarion-c9f62eec7d). A broken commit still cannot reach build/publish: the
  # build jobs `needs` this job, which fails if any inner gate fails.
  verify:
    name: Verify (pre-release gates)
    uses: ./.github/workflows/verify.yml

  build-rust:
    needs: [verify, assert-on-main]
    name: Build loomweave (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          # x86_64-apple-darwin (macos-13) is temporarily dropped while those
          # runners are offline/unreliable (clarion-12667da9f5 follow-up). 1.0.1
          # ships Linux + macOS aarch64; restore the Intel leg when macos-13
          # runner health recovers.
          - target: aarch64-apple-darwin
            runner: macos-14
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          key: release-${{ matrix.target }}

      - name: build release
        run: |
          set -euo pipefail
          cargo build --release --locked --bin loomweave --target ${{ matrix.target }}

      - name: package
        id: package
        run: |
          set -euo pipefail
          STAGE="loomweave-${{ matrix.target }}"
          mkdir -p "$STAGE"
          cp "target/${{ matrix.target }}/release/loomweave" "$STAGE/"
          cp README.md "$STAGE/"
          if [ -f LICENSE ]; then cp LICENSE "$STAGE/"; fi
          ARCHIVE="$STAGE.tar.gz"
          tar czf "$ARCHIVE" "$STAGE"
          # Portable across the runner matrix: macOS images ship `shasum`, not
          # GNU `sha256sum`. Both emit the same `<hex>  <filename>` line.
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"
          else
            shasum -a 256 "$ARCHIVE" > "$ARCHIVE.sha256"
          fi
          SMOKE_DIR="$(mktemp -d)"
          tar xzf "$ARCHIVE" -C "$SMOKE_DIR"
          "$SMOKE_DIR/$STAGE/loomweave" --version
          "$SMOKE_DIR/$STAGE/loomweave" --help >/dev/null
          echo "archive=$ARCHIVE" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: loomweave-${{ matrix.target }}
          path: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.archive }}.sha256
          if-no-files-found: error
          retention-days: 7

  build-wheels:
    needs: [verify, assert-on-main]
    name: Build loomweave wheel (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    # maturin bin-wheels for PyPI. Matrix mirrors `build-rust` (Linux x86_64 +
    # macOS aarch64); the Intel-macOS leg stays dropped until those runners
    # recover (same note as build-rust). Off-matrix platforms fall back to the
    # cosign-signed GitHub Release tarballs / cargo-binstall.
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            manylinux: "2_28"
          - target: aarch64-apple-darwin
            runner: macos-14
            manylinux: auto
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: build wheel (maturin)
        # Reads crates/loomweave-cli/pyproject.toml ([tool.maturin] bindings="bin").
        # On Linux maturin-action runs inside a manylinux_2_28 container so the
        # wheel is broadly installable (a bare host build tags the runner's glibc).
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b
        with:
          command: build
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --out dist --manifest-path crates/loomweave-cli/Cargo.toml

      - name: smoke-check wheel carries the binary
        run: |
          set -euo pipefail
          WHL=$(ls dist/loomweave-*.whl | head -1)
          echo "built: $WHL"
          python -m zipfile -l "$WHL" | grep -E 'data/scripts/loomweave' \
            || { echo "::error::wheel $WHL missing data/scripts/loomweave"; exit 1; }

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: loomweave-wheel-${{ matrix.target }}
          path: dist/*.whl
          if-no-files-found: error
          retention-days: 7

  build-rust-plugin:
    needs: [verify, assert-on-main]
    name: Build loomweave-plugin-rust wheel (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    # maturin bin-wheels for the Rust language plugin (packaging/rust-plugin-dist,
    # [tool.maturin] bindings="bin"). The `loomweave` wheel pins
    # loomweave-plugin-rust==<v>, so this MUST build+publish alongside the Python
    # plugin or `pip install loomweave` fails resolution. Matrix mirrors
    # build-wheels (Linux x86_64 + macOS aarch64).
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            manylinux: "2_28"
          - target: aarch64-apple-darwin
            runner: macos-14
            manylinux: auto
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: build wheel (maturin)
        # Reads packaging/rust-plugin-dist/pyproject.toml ([tool.maturin]
        # bindings="bin"). manylinux container on Linux for broad installability.
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b
        with:
          command: build
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --out dist --manifest-path packaging/rust-plugin-dist/Cargo.toml

      - name: smoke-check wheel carries the binary
        run: |
          set -euo pipefail
          WHL=$(ls dist/loomweave_plugin_rust-*.whl | head -1)
          echo "built: $WHL"
          python -m zipfile -l "$WHL" | grep -E 'data/scripts/loomweave-plugin-rust' \
            || { echo "::error::wheel $WHL missing data/scripts/loomweave-plugin-rust"; exit 1; }

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: loomweave-plugin-rust-wheel-${{ matrix.target }}
          path: dist/*.whl
          if-no-files-found: error
          retention-days: 7

  build-plugin:
    needs: [verify, assert-on-main]
    name: Build Python plugin sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: install uv
        run: python -m pip install uv==0.10.2

      - name: sync plugin build tools (locked)
        run: uv sync --project plugins/python --locked --extra dev

      - name: build sdist
        run: uv run --project plugins/python --extra dev python -m build --sdist --outdir dist plugins/python

      - name: build wheel
        # Pure-Python wheel (py3-none-any). Published to PyPI alongside the
        # sdist by `publish-pypi`; the sdist remains the GitHub-Release asset.
        run: uv build --wheel --project plugins/python --out-dir dist

      - name: export locked Python runtime dependencies
        run: |
          uv export --project plugins/python --locked --no-dev --no-emit-project \
            --format requirements.txt \
            --output-file dist/loomweave-plugin-python-runtime-requirements.txt
          uv export --project plugins/python --locked --no-dev --no-emit-project \
            --format cyclonedx1.5 \
            --output-file dist/loomweave-plugin-python-sbom.cdx.json

      - name: smoke install sdist
        run: |
          set -euo pipefail
          python -m venv .venv-smoke
          . .venv-smoke/bin/activate
          python -m pip install --require-hashes -r dist/loomweave-plugin-python-runtime-requirements.txt
          python -m pip install --no-deps dist/*.tar.gz
          # Version-agnostic: assert the module constant matches the installed
          # distribution metadata (the sdist's packaged version) rather than a
          # hardcoded literal, so a release version bump can't silently break
          # this smoke gate (clarion-12667da9f5: a hardcoded '1.0.0' here blocked
          # the v1.0.1 publish after the binaries built fine).
          python -c "import loomweave_plugin_python, importlib.metadata as m; v = loomweave_plugin_python.__version__; d = m.version('loomweave-plugin-python'); assert v == d, f'module {v!r} != dist {d!r}'"
          command -v loomweave-plugin-python

      - name: checksum
        run: |
          set -euo pipefail
          cd dist
          for f in *.tar.gz; do
            sha256sum "$f" > "$f.sha256"
          done

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: loomweave-plugin-python-sdist
          path: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
            dist/*.whl
          if-no-files-found: error
          retention-days: 7

  # Two packages publish from one repo+workflow, so each needs its OWN
  # environment: PyPI forbids two *pending* publishers sharing
  # (repository, workflow, environment). Plugin → `pypi-plugin` (real) /
  # `testpypi-plugin` (dry-run); loomweave → `pypi` / `testpypi`. The index is
  # chosen by event (dispatch → TestPyPI, tag push → real PyPI), independent of
  # the environment. Real PyPI is reachable ONLY on a pushed v* tag (the `if`),
  # which is `verify`-gated via build-*; dispatch dry-runs hit TestPyPI only.
  publish-plugin:
    name: Publish loomweave-plugin-python (first)
    needs: [build-plugin]
    runs-on: ubuntu-latest
    # Plugin publishes BEFORE loomweave so its `==<v>` pin resolves on first release.
    if: >-
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && inputs.target_index == 'testpypi')
    environment: ${{ github.event_name == 'workflow_dispatch' && 'testpypi-plugin' || 'pypi-plugin' }}
    permissions:
      id-token: write
    steps:
      - name: download plugin dists
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: loomweave-plugin-python-sdist
          path: dl-plugin

      - name: stage plugin package dir (wheel + sdist only)
        run: |
          set -euo pipefail
          mkdir -p pkg-plugin
          cp dl-plugin/*.whl dl-plugin/*.tar.gz pkg-plugin/
          ls -la pkg-plugin

      - name: publish loomweave-plugin-python
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          packages-dir: pkg-plugin
          attestations: true
          repository-url: ${{ github.event_name == 'workflow_dispatch' && 'https://test.pypi.org/legacy/' || 'https://upload.pypi.org/legacy/' }}

  publish-rust-plugin:
    name: Publish loomweave-plugin-rust (first)
    needs: [build-rust-plugin]
    runs-on: ubuntu-latest
    # Like publish-plugin: the Rust plugin must publish BEFORE loomweave so the
    # cli wheel's loomweave-plugin-rust==<v> pin resolves on first release. Its
    # own environment (pypi-plugin-rust) — PyPI forbids sharing a pending
    # publisher across (repo, workflow, environment).
    if: >-
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && inputs.target_index == 'testpypi')
    environment: ${{ github.event_name == 'workflow_dispatch' && 'testpypi-plugin-rust' || 'pypi-plugin-rust' }}
    permissions:
      id-token: write
    steps:
      - name: download rust plugin wheels
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          pattern: loomweave-plugin-rust-wheel-*
          path: dl-rust-plugin
          merge-multiple: true

      - name: stage rust plugin package dir
        run: |
          set -euo pipefail
          mkdir -p pkg-rust-plugin
          cp dl-rust-plugin/*.whl pkg-rust-plugin/
          ls -la pkg-rust-plugin

      - name: publish loomweave-plugin-rust
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          packages-dir: pkg-rust-plugin
          attestations: true
          repository-url: ${{ github.event_name == 'workflow_dispatch' && 'https://test.pypi.org/legacy/' || 'https://upload.pypi.org/legacy/' }}

  publish-loomweave:
    name: Publish loomweave (after the plugins)
    # Both plugins publish first so the cli wheel's ==<v> pins resolve;
    # build-wheels supplies the loomweave wheels.
    needs: [build-wheels, publish-plugin, publish-rust-plugin]
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && inputs.target_index == 'testpypi')
    environment: ${{ github.event_name == 'workflow_dispatch' && 'testpypi' || 'pypi' }}
    permissions:
      id-token: write
    steps:
      - name: download loomweave wheels
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          pattern: loomweave-wheel-*
          path: dl-loomweave
          merge-multiple: true

      - name: stage loomweave package dir
        run: |
          set -euo pipefail
          mkdir -p pkg-loomweave
          cp dl-loomweave/*.whl pkg-loomweave/
          ls -la pkg-loomweave

      - name: publish loomweave
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          packages-dir: pkg-loomweave
          attestations: true
          repository-url: ${{ github.event_name == 'workflow_dispatch' && 'https://test.pypi.org/legacy/' || 'https://upload.pypi.org/legacy/' }}

  publish-crates:
    name: Publish crates to crates.io
    needs: [verify, assert-on-main]
    runs-on: ubuntu-latest
    # crates.io has no TestPyPI analogue, so this publishes ONLY on a pushed v*
    # tag (verify-gated, on a commit asserted to be on main). cargo publish is
    # idempotent here: an already-uploaded version counts as success, so a re-run
    # after a partial failure is safe. Crates upload leaf -> root; each upload
    # waits for the crates.io index before its dependents publish.
    # loomweave-plugin-fixture is publish=false (test-only) and omitted.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable

      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="$(cargo metadata --no-deps --format-version 1 \
            | python3 -c 'import json,sys; pkgs=json.load(sys.stdin)["packages"]; print(next(p["version"] for p in pkgs if p["name"]=="loomweave-core"))')"
          echo "Publishing workspace version $VERSION"

          wait_for_registry() {
            local crate=$1 tmpdir
            echo "Waiting for $crate $VERSION in the crates.io index..."
            for attempt in $(seq 1 20); do
              tmpdir="$(mktemp -d)"
              if (cd "$tmpdir" && cargo info "$crate@$VERSION" >/dev/null 2>&1); then
                rm -rf "$tmpdir"; echo "$crate $VERSION visible"; return 0
              fi
              rm -rf "$tmpdir"
              echo "$crate $VERSION not visible yet ($attempt/20); sleeping 30s"
              sleep 30
            done
            echo "::error::$crate $VERSION did not appear in the crates.io index"
            return 1
          }

          publish() {
            local crate=$1 output status
            echo "Publishing $crate..."
            set +e
            output="$(cargo publish -p "$crate" --no-verify 2>&1)"
            status=$?
            set -e
            printf '%s\n' "$output"
            if [ "$status" -eq 0 ]; then
              echo "$crate published"
              wait_for_registry "$crate"
            elif grep -Eq "already uploaded|already exists|is already uploaded" <<<"$output"; then
              echo "$crate already published, skipping"
              wait_for_registry "$crate"
            else
              echo "::error::$crate failed to publish"
              return "$status"
            fi
          }

          publish loomweave-core
          publish loomweave-scanner
          publish loomweave-analysis
          publish loomweave-storage
          publish loomweave-federation
          publish loomweave-plugin-rust
          publish loomweave-mcp
          publish loomweave-cli

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-rust, build-plugin]
    # Only publish to a Release when a real tag pushed; workflow_dispatch leaves
    # artifacts on the workflow run for inspection without creating a public Release.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      actions: read
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          path: artifacts

      - name: stage release assets
        run: |
          set -euo pipefail
          mkdir -p release
          find artifacts -name '*.tar.gz' -o -name '*.tar.gz.sha256' \
            | xargs -I{} cp {} release/
          ls -la release/

      - name: install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6
        with:
          # Pin cosign 2.x. The installer's resolved default moved to v3.0.6,
          # whose `sign-blob` requires a bundle and breaks the
          # --output-signature/--output-certificate flow ("create bundle file:
          # open :"). v2.5.2 is the version that signed the last good release
          # (Loomweave v1.1.0). Porting sign-blob/verify-blob to cosign 3.x is a
          # separate follow-up.
          cosign-release: 'v2.5.2'

      - name: sign release archives
        run: |
          set -euo pipefail
          for asset in release/*.tar.gz; do
            cosign sign-blob --yes \
              --output-signature "$asset.sig" \
              --output-certificate "$asset.pem" \
              "$asset"
          done
          ls -la release/

      - name: smoke-verify release archive signatures
        run: |
          set -euo pipefail
          for asset in release/*.tar.gz; do
            cosign verify-blob \
              --certificate "$asset.pem" \
              --signature "$asset.sig" \
              --certificate-identity-regexp "https://github.com/${GITHUB_REPOSITORY}/.github/workflows/release.yml@refs/tags/v.*" \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              "$asset"
          done

      - name: derive previous tag
        id: prev
        run: |
          set -euo pipefail
          PREV=$(git tag --sort=-v:refname | grep -v "^${GITHUB_REF_NAME}\$" | head -n1 || true)
          if [ -z "$PREV" ]; then
            echo "previous=" >> "$GITHUB_OUTPUT"
            echo "No previous tag found (first release)."
          else
            echo "previous=$PREV" >> "$GITHUB_OUTPUT"
            echo "Previous tag: $PREV"
          fi

      - name: generate notes
        id: notes
        run: |
          set -euo pipefail
          PREV="${{ steps.prev.outputs.previous }}"
          # Derive the actual sdist filename from the staged artifact rather
          # than hard-coding it: PEP 625 (and the hatchling build backend)
          # normalize the project name and embed the version, so any version
          # bump or normalization-rule change would invalidate a literal URL.
          # `|| true` so `set -e` does not abort the script when the glob
          # is empty — we want to fall through to the explicit error below.
          SDIST_PATH=$(ls release/loomweave[-_]plugin[-_]python*.tar.gz 2>/dev/null | head -n1 || true)
          if [ -z "$SDIST_PATH" ]; then
            echo "::error::no Python plugin sdist found in release/ — refusing to publish notes with a broken install link" >&2
            exit 1
          fi
          SDIST_NAME=$(basename "$SDIST_PATH")
          {
            echo "## Loomweave ${GITHUB_REF_NAME}"
            echo ""
            echo "### Install"
            echo ""
            echo "Pick the archive for your platform from the Assets list below."
            echo "Verify the SHA256, extract, and place \`loomweave\` on your \`\$PATH\`."
            echo ""
            echo "\`\`\`bash"
            echo "curl -L -o loomweave.tar.gz \\"
            echo "  https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/loomweave-x86_64-unknown-linux-gnu.tar.gz"
            echo "tar xzf loomweave.tar.gz"
            echo "install loomweave-x86_64-unknown-linux-gnu/loomweave ~/.local/bin/"
            echo ""
            echo "pipx install \\"
            echo "  https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/${SDIST_NAME}"
            echo "\`\`\`"
            echo ""
            echo "Full walkthrough: [docs/operator/getting-started.md](https://github.com/${GITHUB_REPOSITORY}/blob/${GITHUB_REF_NAME}/docs/operator/getting-started.md)."
            echo ""
            echo "### Changes"
            echo ""
            if [ -n "$PREV" ]; then
              git log --merges --pretty='- %s (%h)' "${PREV}..${GITHUB_REF_NAME}" || true
            else
              echo "First release — see git history."
            fi
          } > NOTES.md
          echo "notes-file=NOTES.md" >> "$GITHUB_OUTPUT"

      - name: create release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          tag_name: ${{ github.ref_name }}
          name: Loomweave ${{ github.ref_name }}
          body_path: ${{ steps.notes.outputs.notes-file }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') }}
          files: release/*
          fail_on_unmatched_files: true

  verify-published-release:
    name: Verify published release assets
    needs: [release]
    runs-on: ubuntu-latest
    # Post-publish gate: prove the assets actually served from the public
    # GitHub Release match the signed local copies. The in-`release`-job
    # `cosign verify-blob` only proves signing worked on the build runner; it
    # does not prove the published download matches. This job downloads the
    # public assets, recomputes SHA256 against the published `.sha256`
    # sidecars, and re-verifies the cosign signatures against the public Rekor
    # entries.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
    steps:
      - name: install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6
        with:
          # Pin cosign 2.x. The installer's resolved default moved to v3.0.6,
          # whose `sign-blob` requires a bundle and breaks the
          # --output-signature/--output-certificate flow ("create bundle file:
          # open :"). v2.5.2 is the version that signed the last good release
          # (Loomweave v1.1.0). Porting sign-blob/verify-blob to cosign 3.x is a
          # separate follow-up.
          cosign-release: 'v2.5.2'

      - name: download published assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p published
          cd published
          gh release download "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern '*.tar.gz' \
            --pattern '*.tar.gz.sha256' \
            --pattern '*.tar.gz.sig' \
            --pattern '*.tar.gz.pem'
          ls -la

      - name: recompute SHA256 against published checksums
        run: |
          set -euo pipefail
          cd published
          shopt -s nullglob
          checksums=(*.tar.gz.sha256)
          if [ ${#checksums[@]} -eq 0 ]; then
            echo "::error::no .sha256 sidecars found in the published release" >&2
            exit 1
          fi
          for sum in "${checksums[@]}"; do
            sha256sum -c "$sum"
          done

      - name: cosign verify published archives against Rekor
        run: |
          set -euo pipefail
          cd published
          shopt -s nullglob
          archives=(*.tar.gz)
          if [ ${#archives[@]} -eq 0 ]; then
            echo "::error::no .tar.gz archives found in the published release" >&2
            exit 1
          fi
          for asset in "${archives[@]}"; do
            cosign verify-blob \
              --certificate "$asset.pem" \
              --signature "$asset.sig" \
              --certificate-identity-regexp "https://github.com/${GITHUB_REPOSITORY}/.github/workflows/release.yml@refs/tags/v.*" \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              "$asset"
          done
