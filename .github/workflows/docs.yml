name: Docs

# Build and deploy the Clarion documentation site (web/) to GitHub Pages.
# The site is served at https://clarion.foundryside.dev via the CNAME in
# web/docs/CNAME. Deploys on push to main; PRs get a strict build check only.

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "web/**"
      - ".github/workflows/docs.yml"

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  docs:
    name: Build + deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: web/requirements.txt
      - run: pip install -r web/requirements.txt
      - name: Build (strict)
        run: mkdocs build --strict -f web/mkdocs.yml
      - name: Deploy to gh-pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: mkdocs gh-deploy --force -f web/mkdocs.yml
