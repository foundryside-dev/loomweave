# deny.toml — cargo-deny v2 schema. Anything not in `allow` is denied.

[advisories]
version = 2
yanked = "deny"
ignore = []

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"
# loomweave-cli's dev-dependency on the publish=false test crate
# loomweave-plugin-fixture is path-only (no version) so `cargo publish` strips
# it when packaging loomweave for crates.io. A versionless path dep reads as a
# "wildcard" to cargo-deny; allow it for local path deps only (registry
# wildcards are still denied).
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
